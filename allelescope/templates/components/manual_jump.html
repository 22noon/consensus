<div class="card p-2 mb-3 bg-light border">
  <div class="row g-2 align-items-center">

    <div class="col-auto">
      <label class="small fw-semibold">Jump to position</label>
    </div>

    <div class="col">
      <input type="text"
             id="manual-position-input"
             class="form-control form-control-sm">
    </div>

    <div class="col-auto">
      <button class="btn btn-sm btn-primary"
              onclick="addManualVariantRow()">
        Add
      </button>
    </div>

    <div class="col-auto">
      <button class="btn btn-sm btn-outline-secondary"
              onclick="clearManualVariants()">
        Clear
      </button>
    </div>

  </div>
</div>
