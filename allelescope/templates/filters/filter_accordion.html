<div class="d-flex justify-content-between align-items-center mb-2">

    <strong class="small text-muted">Filters</strong>

    <button class="btn btn-sm btn-outline-secondary"
            onclick="resetFilters()">
        Reset
    </button>

</div>
<div class="d-flex gap-2 mb-2">

    <select id="preset-select" class="form-select form-select-sm">
        <option value="">-- Presets --</option>
    </select>

    <button class="btn btn-sm btn-outline-primary"
            onclick="savePresetPrompt()">
        Save
    </button>

    <button class="btn btn-sm btn-outline-secondary"
            onclick="loadPreset()">
        Load
    </button>

    <button class="btn btn-sm btn-outline-danger"
            onclick="deletePreset()">
        Delete
    </button>

</div>
<div class="accordion mb-3" id="readFilterAccordion">

    {% include "filters/value_filters.html" %}
    {% include "filters/baq_filters.html" %}
    {% include "filters/include_filters.html" %}
    {% include "filters/exclude_filters.html" %}

</div>
